<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Rocket Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a1628;
            overflow: hidden;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
        }

        /* Milky Way background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('milkyway-bg.jpg') center center / cover no-repeat;
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(10, 22, 40, 0.3) 0%,
                rgba(10, 22, 40, 0.15) 50%,
                rgba(10, 22, 40, 0.4) 100%
            );
            z-index: -1;
        }

        .label {
            position: fixed;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            color: #00d1ff;
            font-size: 1.2rem;
            letter-spacing: 3px;
            z-index: 100;
            text-shadow: 0 0 20px rgba(0,209,255,0.5);
        }
        .label small {
            display: block;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-top: 6px;
            font-weight: 400;
        }

        /* ═══ LAUNCH PAD ═══ */
        .launch-scene {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            perspective: 800px;
            z-index: 10;
        }

        .launch-scene.launching .rocket-3d {
            animation: css-launch 3.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* ═══ 3D ROCKET ═══ */
        .rocket-3d {
            position: relative;
            width: 60px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateY(-15deg) rotateX(3deg);
            transition: transform 0.3s ease;
        }

        /* Cylindrical body — built from layered divs */
        .rocket-body {
            position: absolute;
            width: 60px;
            height: 120px;
            top: 50px;
            left: 0;
            transform-style: preserve-3d;
        }

        /* Main body cylinder face */
        .body-face {
            position: absolute;
            width: 60px;
            height: 120px;
            border-radius: 8px;
            background: linear-gradient(
                90deg,
                #aab5c0 0%,
                #d8dee6 20%,
                #f2f4f7 45%,
                #ffffff 50%,
                #f2f4f7 55%,
                #d8dee6 80%,
                #aab5c0 100%
            );
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
        }

        /* Side face for 3D depth */
        .body-side {
            position: absolute;
            width: 20px;
            height: 120px;
            background: linear-gradient(180deg, #8a95a3, #6b7785);
            transform: rotateY(90deg) translateZ(30px) translateX(-10px);
            border-radius: 0 4px 4px 0;
        }

        /* Red accent stripes */
        .body-stripe {
            position: absolute;
            width: 60px;
            height: 8px;
            background: linear-gradient(90deg, #991f1f, #e74c3c, #ff6b6b, #e74c3c, #991f1f);
            border-radius: 2px;
            z-index: 2;
        }
        .body-stripe.top { top: 8px; }
        .body-stripe.mid { top: 55px; }
        .body-stripe.bot { bottom: 8px; }

        /* ISRO logo area */
        .body-logo {
            position: absolute;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            width: 36px; height: 22px;
            background: linear-gradient(135deg, #1a4a8a, #2980b9);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.45rem;
            color: white;
            letter-spacing: 2px;
            z-index: 3;
            box-shadow: 0 0 6px rgba(41,128,185,0.5);
        }

        /* Window porthole */
        .body-window {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            width: 18px; height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #75c8f0, #1a5276, #0d2137);
            border: 2px solid #c0c8d0;
            z-index: 3;
            box-shadow: 0 0 10px rgba(117,200,240,0.4),
                        inset 0 0 5px rgba(255,255,255,0.3);
        }

        /* ═══ NOSE CONE ═══ */
        .nose-cone-3d {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 55px solid #c0392b;
            filter: drop-shadow(0 -4px 8px rgba(192,57,43,0.3));
            z-index: 2;
        }

        /* Nose cone highlight */
        .nose-cone-3d::after {
            content: '';
            position: absolute;
            top: 18px;
            left: -12px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 35px solid rgba(231,76,60,0.7);
        }

        /* ═══ FINS ═══ */
        .fin-3d {
            position: absolute;
            bottom: -5px;
            width: 0; height: 0;
            z-index: 1;
        }

        .fin-3d.left {
            left: -18px;
            border-top: 25px solid transparent;
            border-bottom: 30px solid transparent;
            border-right: 25px solid #c0392b;
            filter: drop-shadow(-2px 2px 4px rgba(0,0,0,0.3));
        }

        .fin-3d.right {
            right: -18px;
            border-top: 25px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 25px solid #c0392b;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }

        /* Bottom fin (3D perspective) */
        .fin-3d.bottom {
            left: 50%;
            transform: translateX(-50%) perspective(200px) rotateX(60deg);
            bottom: -10px;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #991f1f;
        }

        /* ═══ ENGINE NOZZLE ═══ */
        .engine-bell {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 18px;
            background: linear-gradient(180deg, #555, #333, #222);
            border-radius: 0 0 8px 8px;
            z-index: 4;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .engine-bell::before {
            content: '';
            position: absolute;
            top: -3px; left: -4px;
            width: 38px; height: 6px;
            background: linear-gradient(90deg, #666, #999, #666);
            border-radius: 3px;
        }

        /* ═══ FLAME & EXHAUST ═══ */
        .flame-group {
            position: absolute;
            bottom: -105px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 90px;
            z-index: 3;
        }

        .flame-core {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 55px;
            background: linear-gradient(to bottom,
                rgba(255,255,255,1) 0%,
                rgba(200,230,255,0.95) 15%,
                rgba(100,180,255,0.8) 30%,
                rgba(255,200,50,0.7) 60%,
                rgba(255,120,20,0.4) 80%,
                transparent 100%
            );
            border-radius: 40% 40% 60% 60%;
            animation: flame-dance 0.08s infinite alternate;
            filter: blur(1px);
        }

        .flame-outer {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 70px;
            background: linear-gradient(to bottom,
                rgba(255,180,50,0.9) 0%,
                rgba(255,120,20,0.7) 30%,
                rgba(255,80,10,0.4) 60%,
                transparent 100%
            );
            border-radius: 40% 40% 55% 55%;
            animation: flame-dance 0.12s infinite alternate-reverse;
            filter: blur(2px);
        }

        .flame-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 100px;
            background: radial-gradient(ellipse at center bottom,
                rgba(255,150,30,0.25) 0%,
                rgba(255,100,20,0.1) 40%,
                transparent 70%
            );
            animation: glow-pulse 0.3s infinite alternate;
        }

        /* Smoke particles */
        .smoke-particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,200,200,0.4), transparent);
            animation: smoke-rise 1.5s ease-out infinite;
            filter: blur(6px);
        }
        .smoke-particle:nth-child(1) { left: 10px; width: 20px; height: 20px; animation-delay: 0s; }
        .smoke-particle:nth-child(2) { left: 20px; width: 25px; height: 25px; animation-delay: 0.3s; }
        .smoke-particle:nth-child(3) { left: 5px;  width: 18px; height: 18px; animation-delay: 0.6s; }
        .smoke-particle:nth-child(4) { left: 25px; width: 22px; height: 22px; animation-delay: 0.9s; }

        @keyframes flame-dance {
            0%   { transform: translateX(-50%) scaleX(1) scaleY(1); }
            100% { transform: translateX(-50%) scaleX(0.85) scaleY(1.08); }
        }

        @keyframes glow-pulse {
            0%   { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @keyframes smoke-rise {
            0%   { opacity: 0.5; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(80px) scale(2.5); }
        }

        @keyframes css-launch {
            0%   { transform: rotateY(-15deg) rotateX(3deg) translateY(0); }
            20%  { transform: rotateY(-8deg) rotateX(1deg) translateY(-20vh); }
            100% { transform: rotateY(0deg) rotateX(0deg) translateY(-160vh); }
        }

        /* ═══ CONTROLS ═══ */
        .controls {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex; gap: 12px;
        }

        .btn {
            padding: 12px 28px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            background: rgba(0,209,255,0.15);
            border: 1px solid rgba(0,209,255,0.4);
            color: #00d1ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        .btn:hover {
            background: #00d1ff;
            color: #0a1628;
        }
    </style>
</head>
<body>
    <div class="label">
        CSS 3D ROCKET
        <small>Pure CSS — zero external libraries</small>
    </div>

    <div class="launch-scene" id="launchScene">
        <div class="rocket-3d">
            <!-- Nose Cone -->
            <div class="nose-cone-3d"></div>

            <!-- Body -->
            <div class="rocket-body">
                <div class="body-face">
                    <div class="body-stripe top"></div>
                    <div class="body-logo">ISRO</div>
                    <div class="body-window"></div>
                    <div class="body-stripe mid"></div>
                    <div class="body-stripe bot"></div>
                </div>
                <div class="body-side"></div>
            </div>

            <!-- Fins -->
            <div class="fin-3d left"></div>
            <div class="fin-3d right"></div>
            <div class="fin-3d bottom"></div>

            <!-- Engine -->
            <div class="engine-bell"></div>

            <!-- Flame -->
            <div class="flame-group">
                <div class="flame-glow"></div>
                <div class="flame-outer"></div>
                <div class="flame-core"></div>
                <div class="smoke-particle"></div>
                <div class="smoke-particle"></div>
                <div class="smoke-particle"></div>
                <div class="smoke-particle"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="document.getElementById('launchScene').classList.toggle('launching')">LAUNCH / RESET</button>
    </div>

    <script>
        // Subtle hover rotation
        const rocket = document.querySelector('.rocket-3d');
        document.addEventListener('mousemove', (e) => {
            if (document.getElementById('launchScene').classList.contains('launching')) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * -8;
            rocket.style.transform = `rotateY(${-15 + x}deg) rotateX(${3 + y}deg)`;
        });
    </script>
</body>
</html>
